<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>4x6 Brochure Generator</title>

  <style>
    @page {
      size: letter;
      margin: 10mm;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

    .editor {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .form-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-weight: bold;
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .full {
      grid-column: 1 / -1;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .preview-wrapper {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .brochure {
      width: 196mm;
      min-height: 259mm;
      background: white;
      padding: 0;
      font-size: 12px;
      line-height: 1.3;
    }

    .socials-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 0 8px 0;
      font-size: 14px;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .social-item-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .text-icon {
      width: 36px;
      height: 36px;
      background: #000;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .social-icon {
      width: 36px;
      height: 36px;
      filter: grayscale(100%) contrast(1.5);
    }

    .brochure-images {
      text-align: center;
    }

    .brochure-images img {
      display: block;
      margin: 5px auto;
      object-fit: contain;
      filter: grayscale(100%) contrast(1.5);
    }

    .brochure-images img:first-child {
      width: 50%;
    }

    .brochure-images img:last-child {
      width: 85%;
    }

    @media print {
      .editor { display: none; }
      .preview-wrapper { padding: 0; margin: 0; display: block; }
      .brochure { width: 100%; }
    }
  </style>
</head>

<body>

  <div class="editor">
    <div class="form-section">

      <h2>Brochure Information</h2>

      <div class="form-grid">

        <div>
          <label>Instagram</label>
          <input id="instagram" value="@as_sourdoughbakery">
        </div>

        <div>
          <label>Facebook</label>
          <input id="facebook" value="facebook.com/A's Sourdough Bakery">
        </div>

        <div>
          <label>Email</label>
          <input id="email" value="aydan.bas@outlook.com">
        </div>

        <div>
          <label>Phone</label>
          <input id="phone" value="(613) 555-1234">
        </div>

        <div class="full">
          <label>Title</label>
          <input id="title" value="A's Sourdough Bakery">
        </div>

        <div class="full">
          <label>Subtitle</label>
          <input id="subtitle" value="Handcrafted with love in Spencerville, Ontario">
        </div>

        <div>
          <label>Image 1</label>
          <input type="file" id="img1Upload" accept="image/*">
        </div>

        <div>
          <label>Image 2</label>
          <input type="file" id="img2Upload" accept="image/*">
        </div>

      </div>

      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="exportJSON()">Export JSON</button>
        <button onclick="document.getElementById('jsonImport').click()">Import JSON</button>
        <input type="file" id="jsonImport" accept=".json" style="display:none">
        <button onclick="window.print()">Print Brochure</button>
      </div>

    </div>
  </div>

  <div class="preview-wrapper">

    <div class="brochure">

      <div class="socials-bar">
        <div class="social-item">
          <img src="../facebook.png" alt="" class="social-icon">
          <span data-fill="facebook"></span>
        </div>
        <div class="social-item">
          <img src="../instagram.png" alt="" class="social-icon">
          <span data-fill="instagram"></span>
        </div>
        <div class="social-item">
          <span class="text-icon"><span style="font-size:32px;position:relative;top:-2px;">&#9993;</span></span>
          <span data-fill="email"></span>
        </div>
        <div class="social-item">
          <span class="text-icon" style="font-size:13px;font-weight:bold;font-family:'Arial Narrow',sans-serif;letter-spacing:-0.5px;">SMS</span>
          <span data-fill="phone"></span>
        </div>
      </div>

      <div class="brochure-images">
        <img id="img1" src="ChatGPT Image May 16, 2026 at 06_54_33 AM.png" alt="Image 1">
        <img id="img2" src="no25.png" alt="Image 2">
      </div>

    </div>

  </div>

  <script>
    const fields = ["instagram", "facebook", "email", "phone", "title", "subtitle"];

    function updateBrochure() {
      fields.forEach(field => {
        const input = document.getElementById(field);
        const targets = document.querySelectorAll(`[data-fill="${field}"]`);
        targets.forEach(target => {
          target.textContent = input.value;
          const row = target.closest('.social-item, .social-item-right');
          if (row) {
            row.style.display = input.value.trim() ? '' : 'none';
          }
        });
      });
    }

    fields.forEach(field => {
      document.getElementById(field).addEventListener("input", updateBrochure);
    });

    updateBrochure();

    document.getElementById("img1Upload").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (evt) {
        document.getElementById("img1").src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("img2Upload").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (evt) {
        document.getElementById("img2").src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    function exportJSON() {
      const data = {};
      fields.forEach(field => {
        data[field] = document.getElementById(field).value;
      });
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "brochure.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("jsonImport").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (evt) {
        try {
          const data = JSON.parse(evt.target.result);
          fields.forEach(field => {
            if (data[field] !== undefined) {
              document.getElementById(field).value = data[field];
            }
          });
          updateBrochure();
        } catch (err) {
          alert("Invalid JSON file.");
        }
      };
      reader.readAsText(file);
      this.value = "";
    });
  </script>

</body>
</html>
